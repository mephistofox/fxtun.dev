name: CI Server

on:
  push:
    branches: [master]
    paths:
      - 'internal/server/**'
      - 'internal/config/**'
      - 'internal/protocol/**'
      - 'internal/inspect/**'
      - 'cmd/server/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci-server.yml'
  pull_request:
    branches: [master]
    paths:
      - 'internal/server/**'
      - 'internal/config/**'
      - 'internal/protocol/**'
      - 'internal/inspect/**'
      - 'cmd/server/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci-server.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./cmd/server/... ./internal/server/... ./internal/config/... ./internal/protocol/... ./internal/inspect/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./cmd/server/... ./internal/server/... ./internal/config/... ./internal/protocol/... ./internal/inspect/...

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build server
        run: go build -o /dev/null ./cmd/server
