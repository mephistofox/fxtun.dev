name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server }}
      web: ${{ steps.changes.outputs.web }}
      clients: ${{ steps.changes.outputs.clients }}
      gui: ${{ steps.changes.outputs.gui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "server=true" >> $GITHUB_OUTPUT
            echo "web=true" >> $GITHUB_OUTPUT
            echo "clients=true" >> $GITHUB_OUTPUT
            echo "gui=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          if echo "$CHANGED" | grep -qE '^(cmd/server|internal/server|internal/(config|protocol|inspect)|go\.(mod|sum))'; then
            echo "server=true" >> $GITHUB_OUTPUT
          else
            echo "server=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^web/'; then
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "web=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^(cmd/client|internal/client|internal/(config|protocol|inspect)|go\.(mod|sum))'; then
            echo "clients=true" >> $GITHUB_OUTPUT
          else
            echo "clients=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE '^(gui/|internal/client|internal/(config|protocol|inspect)|go\.(mod|sum))'; then
            echo "gui=true" >> $GITHUB_OUTPUT
          else
            echo "gui=false" >> $GITHUB_OUTPUT
          fi

  deploy-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")-staging
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build server
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags "-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" \
            -o fxtunnel-server ./cmd/server

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy server (blue-green)
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          scp -i $SSH_KEY fxtunnel-server ${SSH_USER}@${SSH_HOST}:/root/fxtunnel/bin/fxtunnel-server.new
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "/root/fxtunnel/deploy.sh"

  deploy-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: cd web && pnpm install && pnpm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "mkdir -p /var/www/fxtunnel"
          rsync -az --delete -e "ssh -i $SSH_KEY" web/dist/ ${SSH_USER}@${SSH_HOST}:/var/www/fxtunnel/
          echo "Frontend deployed"

  build-clients:
    needs: detect-changes
    if: needs.detect-changes.outputs.clients == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")-staging
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build CLI clients
        run: |
          mkdir -p clients
          LDFLAGS="-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')"

          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o clients/fxtunnel-linux-amd64       ./cmd/client
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o clients/fxtunnel-linux-arm64       ./cmd/client
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o clients/fxtunnel-darwin-amd64      ./cmd/client
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o clients/fxtunnel-darwin-arm64      ./cmd/client
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o clients/fxtunnel-windows-amd64.exe ./cmd/client

          ls -lh clients/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy clients
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "mkdir -p /root/fxtunnel/downloads"
          rsync -az -e "ssh -i $SSH_KEY" clients/ ${SSH_USER}@${SSH_HOST}:/root/fxtunnel/downloads/
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "chmod +x /root/fxtunnel/downloads/*"
          echo "Clients deployed"

  build-gui:
    needs: detect-changes
    if: needs.detect-changes.outputs.gui == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: fxtunnel-gui-linux-amd64
            wails_tags: "-tags webkit2_41"
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: fxtunnel-gui-windows-amd64.exe
            wails_tags: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: fxtunnel-gui-darwin-arm64
            wails_tags: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: fxtunnel-gui-darwin-amd64
            wails_tags: ""
    runs-on: ${{ matrix.os }}
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")-staging
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build GUI
        shell: bash
        run: |
          cd gui/frontend && pnpm install && cd ../..
          cd gui && wails build ${{ matrix.wails_tags }} -platform ${{ matrix.goos }}/${{ matrix.goarch }} \
            -ldflags "-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S')" \
            -o ${{ matrix.artifact }} && cd ..
          ls -la gui/build/bin/

      - name: Collect artifact
        shell: bash
        run: |
          # Find the actual binary (Wails on macOS puts it in .app bundle)
          if [ -f "gui/build/bin/${{ matrix.artifact }}" ]; then
            cp gui/build/bin/${{ matrix.artifact }} .
          else
            # Search for real binary (>1MB) in build output
            FOUND=$(find gui/build/bin -type f -size +1M | head -1)
            if [ -n "$FOUND" ]; then
              cp "$FOUND" ./${{ matrix.artifact }}
            else
              echo "ERROR: could not find built binary"
              find gui/build/bin -type f -ls
              exit 1
            fi
          fi
          ls -lh ${{ matrix.artifact }}

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy GUI client
        shell: bash
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
        run: |
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "mkdir -p /root/fxtunnel/downloads"
          scp -i $SSH_KEY ${{ matrix.artifact }} ${SSH_USER}@${SSH_HOST}:/root/fxtunnel/downloads/
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} "chmod +x /root/fxtunnel/downloads/${{ matrix.artifact }}"
          echo "GUI ${{ matrix.artifact }} deployed"
