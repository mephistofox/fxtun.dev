# nginx config for fxtun.ru — Russian mirror
# SSG pages are rewritten to /ru/ prefix so Go serves pre-rendered Russian HTML

# === HTTP (port 80) ===

server {
    listen 80;
    server_name fxtun.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name *.fxtun.ru;
    client_max_body_size 0;
    return 301 https://$host$request_uri;
}

# === HTTPS (port 8443 — from stream passthrough) ===

server {
    listen 8443 ssl http2 proxy_protocol;
    server_name fxtun.ru;

    ssl_certificate /etc/letsencrypt/live/fxtun.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fxtun.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    # SSG Russian pre-rendered pages: rewrite to /ru prefix
    # Note: /ru (no trailing slash) maps to dist/ru.html in SSG output
    location = / { rewrite ^ /ru last; }
    location = /login { rewrite ^ /ru/login last; }
    location = /register { rewrite ^ /ru/register last; }
    location = /offer { rewrite ^ /ru/offer last; }

    # Blog: RU content from Hugo /ru/ output
    location /blog/ {
        alias /var/www/fxtunnel-blog/ru/;
        index index.html;
        try_files $uri $uri/ =404;
        expires 30d;
        add_header Cache-Control "public, no-cache";

        location ~* \.(css|js|woff2|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location = /blog {
        return 301 https://$host/blog/;
    }

    # /en/blog/* → redirect to fxtun.dev/blog/*
    location /en/blog/ {
        rewrite ^/en(/blog/.*)$ https://fxtun.dev$1 redirect;
    }
    location = /en/blog {
        return 302 https://fxtun.dev/blog/;
    }

    # /ru/blog/* → strip prefix, stay on fxtun.ru
    location /ru/blog/ {
        rewrite ^/ru(/blog/.*)$ $1 redirect;
    }
    location = /ru/blog {
        return 302 https://fxtun.ru/blog/;
    }

    # Everything else (API, assets, SPA fallback) — proxy to Go
    location / {
        proxy_pass http://127.0.0.1:10081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Wildcard subdomains — tunnel proxy
server {
    listen 8443 ssl http2 proxy_protocol;
    server_name *.fxtun.ru;
    client_max_body_size 0;

    ssl_certificate /etc/letsencrypt/live/fxtun.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fxtun.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:10080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
